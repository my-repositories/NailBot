name: nailbot

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    expose:
        - 5432
    ports:
      - "5432:5432"

  dbpga:
    image: dpage/pgadmin4
    profiles: ["pgadmin"]
    depends_on:
      db:
        condition: service_healthy
    restart: always
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASS}
    ports:
      - "5050:80"
    volumes:
      - ./servers.json:/pgadmin4/servers.json

  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MODE: ${MODE:-onprem}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TZ: ${TZ:-UTC}
      DATABASE_URL: ${DATABASE_URL:-postgres://nailbot:nailbot@db:5432/nailbot}
      API_BIND: ${API_BIND:-0.0.0.0:8080}
      LICENSE_KEY: ${LICENSE_KEY:-}
      LICENSE_SERVER_URL: ${LICENSE_SERVER_URL:-}
      INSTANCE_ID: ${INSTANCE_ID:-}
      SAAS_TENANT_REGISTRY: ${SAAS_TENANT_REGISTRY:-}
      BILLING_PROVIDER: ${BILLING_PROVIDER:-none}
      BILLING_WEBHOOK_SECRET: ${BILLING_WEBHOOK_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - app_data:/app/data

  bot:
    build:
      context: .
      target: bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MODE: ${MODE:-onprem}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TZ: ${TZ:-UTC}
      BOT_TOKEN: ${BOT_TOKEN:-}
      ADMIN_IDS: ${ADMIN_IDS:-}
      CHANNEL_ID: ${CHANNEL_ID:-}
      CHANNEL_LINK: ${CHANNEL_LINK:-}
      LICENSE_KEY: ${LICENSE_KEY:-}
      LICENSE_SERVER_URL: ${LICENSE_SERVER_URL:-}
      INSTANCE_ID: ${INSTANCE_ID:-}
      SAAS_MASTER_BOT_TOKEN: ${SAAS_MASTER_BOT_TOKEN:-}
      API_BASE_URL: ${API_BASE_URL:-http://api:8080}
    depends_on:
      api:
        condition: service_started
    volumes:
      - app_data:/app/data

volumes:
  app_data:
  pg_data:
